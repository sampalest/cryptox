name: 🔐 CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # Skip electron's binary download: this job doesn't run electron, and the
      # download is flaky from CI runners (504s from GitHub) and would fail npm ci.
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🧹 Lint
        run: npm run lint

  unit:
    name: 🧪 Unit tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Run across OSes and both arches so the Windows filesystem exercises the tar
    # reserved-name sanitizer and the crypto core (WASM libsodium) is confirmed on
    # x64 and arm64.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🧪 Run unit tests
        run: npm run test:unit

  # Aggregates the unit matrix under the exact name the develop branch
  # protection requires ("🧪 Unit tests"); the matrix legs report as
  # "🧪 Unit tests (<os>)", which the protection rule does not match, so PRs
  # hung on "Expected: waiting for status" after the matrix split (APP-11).
  # always() keeps the gate reporting on failed legs too: a skipped required
  # check would satisfy branch protection and let a red matrix through.
  unit-gate:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest
    needs: [unit]
    if: always()
    steps:
      - name: 🧪 Require every unit matrix leg to pass
        run: test "${{ needs.unit.result }}" = "success"

  audit:
    name: 🛡️ Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🛡️ Audit dependencies
        run: npm audit --omit=dev --audit-level=high

  e2e:
    name: 🖥️ E2E smoke
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: ⚡ Set up Electron
        uses: ./.github/actions/setup-electron
      # test:e2e builds the app + electron bundle internally before running smoke.
      - name: 🖥️ Run E2E smoke test
        run: npm run test:e2e

  package:
    name: 📦 Package (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: [lint, unit, e2e]
    # Only package on pushes to develop/master (set by the workflow triggers),
    # never on pull requests.
    if: github.event_name == 'push'
    # One runner per (OS, arch), with the target arch passed explicitly to
    # electron-builder. Windows and Linux build on native-architecture runners;
    # mac x64 is cross-compiled on macos-15 (arm64) because GitHub retired the
    # macos-13 Intel runners (jobs targeting that label queue forever).
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-15, os: macos, arch: arm64 }
          - { runner: macos-15, os: macos, arch: x64 }
          - { runner: windows-latest, os: windows, arch: x64 }
          - { runner: windows-11-arm, os: windows, arch: arm64 }
          - { runner: ubuntu-latest, os: linux, arch: x64 }
          - { runner: ubuntu-24.04-arm, os: linux, arch: arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # macOS uses the setup-electron workaround (below), so it skips the flaky
      # download during npm ci; Windows/Linux download the binary normally here.
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: ${{ runner.os == 'macOS' && '1' || '' }}
      # extra-arch prefetches the matrix arch's darwin zip when it differs from
      # the runner arch (the cross-compiled mac x64 leg), so app-builder's
      # retry-less download never runs.
      - name: ⚡ Set up Electron
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-electron
        with:
          extra-arch: ${{ matrix.arch }}
      # AppImage hardening (the first-run AppArmor helper, APP-11) repacks the
      # squashfs, so the Linux legs need squashfs-tools.
      - name: 🧰 Install squashfs-tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools
      # electron:build builds the app + electron bundle internally, then packages
      # the matrix arch (mac dmg/zip, Windows nsis+portable, Linux AppImage/deb).
      # The explicit --<arch> flag reaches electron-builder; it is a no-op on the
      # native runners and makes the mac x64 leg cross-compile on macos-15
      # (electron-builder downloads the darwin-x64 Electron dist itself).
      - name: 🏗️ Build & package app
        run: npm run electron:build -- --${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # Shipping an unhardened AppImage must fail the build, never warn.
          CRYPTOX_REQUIRE_APPIMAGE_HARDEN: ${{ runner.os == 'Linux' && '1' || '' }}
      # Each runner produces only its own arch's artifacts; upload them for the
      # release job to aggregate. Foreign globs match nothing (if-no-files-found).
      - name: ⬆️ Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}-${{ matrix.arch }}
          if-no-files-found: ignore
          path: |
            dist_electron/*.dmg
            dist_electron/*.zip
            dist_electron/*.exe
            dist_electron/*.AppImage
            dist_electron/*.deb

  release:
    name: 🚀 Publish release
    runs-on: ubuntu-latest
    needs: [package]
    if: github.event_name == 'push'
    permissions:
      contents: write # create releases / tags
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      # Aggregate every OS's artifacts into dist_electron so one release carries
      # dmg/zip/exe/AppImage/deb together.
      - name: ⬇️ Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist_electron
          pattern: dist-*
          merge-multiple: true
      # Release strategy per branch (see scripts/publish-release.mjs):
      #   master  -> release "v<version>", updated in place if it already exists.
      #   develop -> prerelease "v<version>.<shortsha>"; only this version's prior
      #              prerelease is replaced; other versions' releases are untouched.
      - name: 🚀 Publish releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/publish-release.mjs
