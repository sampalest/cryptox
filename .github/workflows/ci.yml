name: 🔐 CI

on:
  pull_request:
  push:
    branches:
      - develop
      - master

jobs:
  lint:
    name: 🧹 Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      # Skip electron's binary download: this job doesn't run electron, and the
      # download is flaky from CI runners (504s from GitHub) and would fail npm ci.
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🧹 Lint
        run: npm run lint

  unit:
    name: 🧪 Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🧪 Run unit tests
        run: npm run test:unit

  audit:
    name: 🛡️ Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: 🛡️ Audit dependencies
        run: npm audit --audit-level=high

  e2e:
    name: 🖥️ E2E smoke
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: ⚡ Set up Electron
        uses: ./.github/actions/setup-electron
      # test:e2e builds the app + electron bundle internally before running smoke.
      - name: 🖥️ Run E2E smoke test
        run: npm run test:e2e

  package:
    name: 🚀 Package & release
    runs-on: macos-15
    needs: [lint, unit, e2e]
    # Only package on pushes to develop/master (set by the workflow triggers),
    # never on pull requests.
    if: github.event_name == 'push'
    permissions:
      contents: write # create releases / tags
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: 📦 Install dependencies
        run: npm ci
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: "1"
      - name: ⚡ Set up Electron
        uses: ./.github/actions/setup-electron
      # electron:build builds the app + electron bundle internally, then packages.
      - name: 🏗️ Build & package app
        run: npm run electron:build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # A GitHub release is keyed by a single git tag, so each build publishes two:
      #   master  -> "<version>"            (immutable) + "latest" (rolling)
      #   develop -> "<version>.<shortsha>" (immutable) + "dev"    (rolling, prerelease)
      # The rolling release is deleted and recreated so its tag tracks HEAD.
      - name: 🚀 Publish releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version=$(node -p "require('./package.json').version")
          sha=$(git rev-parse --short HEAD)
          assets=(dist_electron/*.dmg dist_electron/*.zip)

          if [ "${{ github.ref_name }}" = "master" ]; then
            primary="$version"; rolling="latest"; flags=""
          else
            primary="$version.$sha"; rolling="dev"; flags="--prerelease"
          fi

          # Immutable, per-build release. Fails if it already exists (e.g. master
          # pushed twice without bumping package.json version) — bump and re-push.
          gh release create "$primary" "${assets[@]}" --target "$GITHUB_SHA" \
            --title "$primary" --notes "Automated build of $sha" $flags

          # Rolling pointer release — recreated each push so its tag tracks HEAD.
          gh release delete "$rolling" --yes --cleanup-tag || true
          gh release create "$rolling" "${assets[@]}" --target "$GITHUB_SHA" \
            --title "$rolling" --notes "Rolling $rolling build ($primary)" $flags
