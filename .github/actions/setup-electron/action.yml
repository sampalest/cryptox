name: Setup Electron binary
description: Reliably install the Electron binary on macOS runners (works around flaky downloads / partial extraction).
inputs:
  extra-arch:
    description: >
      Additional darwin arch to prefetch into the electron cache (for
      cross-packaging, e.g. x64 on the arm64 runner). Ignored when it matches
      the runner arch.
    required: false
    default: ""
runs:
  using: composite
  steps:
    # Reuse the downloaded electron zip across runs to avoid re-hitting GitHub.
    # The extra arch is part of the key so the cross-compiling leg keeps its own
    # cache entry instead of racing the native leg for one shared key.
    - name: ⚡ Cache Electron binary
      uses: actions/cache@v5
      with:
        path: ~/Library/Caches/electron
        key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}${{ inputs.extra-arch && format('-{0}', inputs.extra-arch) || '' }}

    # Electron downloads are unreliable on this runner: requests intermittently
    # return 504, and the normal extraction has produced partial dist folders.
    # The script downloads exact, checksum-verified archives with retries,
    # extracts the native one with ditto, and prefetches any cross-package arch.
    - name: ⚡ Ensure Electron binary is installed
      shell: bash
      env:
        ELECTRON_EXTRA_ARCH: ${{ inputs.extra-arch }}
      run: node scripts/setup-electron.mjs
