name: Setup Electron binary
description: Reliably install the Electron binary on macOS runners (works around flaky downloads / partial extraction).
runs:
  using: composite
  steps:
    # Reuse the downloaded electron zip across runs to avoid re-hitting GitHub.
    - name: ⚡ Cache Electron binary
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/electron
        key: electron-${{ runner.os }}-${{ runner.arch }}-v40.10.2

    # The electron binary install is unreliable on this runner: downloads 504
    # intermittently, and even when the (checksum-verified) zip downloads,
    # electron's bundled extract-zip only partially unpacks it (install.js
    # exits 0 with a truncated dist/ and no path.txt), so `require("electron")`
    # throws "Electron failed to install correctly" in the e2e smoke test.
    # Download the zip with retries, then extract it ourselves with ditto and
    # write path.txt. Verify the executable exists so the job fails here,
    # loudly, if this ever breaks again.
    - name: ⚡ Ensure Electron binary is installed
      shell: bash
      run: |
        for i in 1 2 3 4 5; do
          node node_modules/electron/install.js && break || true
          zip=$(ls ~/Library/Caches/electron/*/electron-v*-darwin-*.zip 2>/dev/null | head -1)
          [ -n "$zip" ] && break
          echo "electron download attempt $i failed; retrying in 10s..."
          sleep 10
        done
        zip=$(ls ~/Library/Caches/electron/*/electron-v*-darwin-*.zip 2>/dev/null | head -1)
        test -n "$zip" || { echo "Electron zip not found in cache after retries"; exit 1; }
        rm -rf node_modules/electron/dist
        mkdir -p node_modules/electron/dist
        ditto -x -k "$zip" node_modules/electron/dist
        printf 'Electron.app/Contents/MacOS/Electron' > node_modules/electron/path.txt
        test -x node_modules/electron/dist/Electron.app/Contents/MacOS/Electron
