<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; frame-src 'none'">
  <title>Lockasaur</title>
</head>

<body>
  <noscript>
    <strong>Lockasaur requires JavaScript to run.</strong>
  </noscript>
  <!-- Mount container only. It must NOT be id="app": App.vue's root div is
       id="app" (the CSS-styled visible window), and Vue mounts inside this
       container, so a duplicate id would make this outer element match every
       #app style and paint an opaque light background behind the themed one
       (which broke dark mode). -->
  <div id="root"></div>
  <script type="module" src="/src/renderer/main.js"></script>
</body>

</html>
